<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f0f;
    font-family: 'DM Sans', sans-serif;
  }

  .calc {
    width: 320px;
    background: #1a1a1a;
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
  }

  .display {
    background: #111;
    border-radius: 16px;
    padding: 20px 24px 16px;
    margin-bottom: 20px;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-end;
    gap: 6px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .expression {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #555;
    min-height: 18px;
    letter-spacing: 0.02em;
    word-break: break-all;
    text-align: right;
  }

  .result {
    font-family: 'DM Mono', monospace;
    font-size: 42px;
    font-weight: 300;
    color: #f0f0f0;
    letter-spacing: -0.02em;
    line-height: 1;
    word-break: break-all;
    text-align: right;
    transition: font-size 0.1s ease;
  }

  .result.small { font-size: 28px; }
  .result.tiny  { font-size: 20px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    height: 66px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.08s ease, background 0.1s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  button:active { transform: scale(0.93); filter: brightness(0.85); }

  /* Number buttons */
  .btn-num {
    background: #252525;
    color: #e8e8e8;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .btn-num:hover { background: #2e2e2e; }

  /* Operator buttons */
  .btn-op {
    background: #2a2420;
    color: #f0a060;
    border: 1px solid rgba(240,160,96,0.15);
  }
  .btn-op:hover { background: #332b22; }

  /* Function buttons (AC, +/-, %) */
  .btn-fn {
    background: #222;
    color: #aaa;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .btn-fn:hover { background: #2a2a2a; }

  /* Equals */
  .btn-eq {
    background: #f0a060;
    color: #1a1a1a;
    font-weight: 500;
  }
  .btn-eq:hover { background: #f5b070; }

  /* Zero spans two columns */
  .span2 { grid-column: span 2; border-radius: 14px; }

  /* Dot button */
  .btn-dot {
    background: #252525;
    color: #e8e8e8;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .btn-dot:hover { background: #2e2e2e; }
</style>
</head>
<body>

<div class="calc">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="grid">
    <button class="btn-fn" onclick="clearAll()">AC</button>
    <button class="btn-fn" onclick="toggleSign()">+/−</button>
    <button class="btn-fn" onclick="percent()">%</button>
    <button class="btn-op" onclick="inputOp('÷')">÷</button>

    <button class="btn-num" onclick="inputNum('7')">7</button>
    <button class="btn-num" onclick="inputNum('8')">8</button>
    <button class="btn-num" onclick="inputNum('9')">9</button>
    <button class="btn-op" onclick="inputOp('×')">×</button>

    <button class="btn-num" onclick="inputNum('4')">4</button>
    <button class="btn-num" onclick="inputNum('5')">5</button>
    <button class="btn-num" onclick="inputNum('6')">6</button>
    <button class="btn-op" onclick="inputOp('−')">−</button>

    <button class="btn-num" onclick="inputNum('1')">1</button>
    <button class="btn-num" onclick="inputNum('2')">2</button>
    <button class="btn-num" onclick="inputNum('3')">3</button>
    <button class="btn-op" onclick="inputOp('+')">+</button>

    <button class="btn-num span2" onclick="inputNum('0')">0</button>
    <button class="btn-dot" onclick="inputDot()">.</button>
    <button class="btn-eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let current = '0';
  let prev = '';
  let operator = '';
  let justEvaluated = false;

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = current;
    const len = current.length;
    resultEl.className = 'result' + (len > 12 ? ' tiny' : len > 8 ? ' small' : '');
  }

  function inputNum(n) {
    if (justEvaluated) { current = n; justEvaluated = false; }
    else current = current === '0' ? n : current + n;
    updateDisplay();
  }

  function inputDot() {
    if (justEvaluated) { current = '0.'; justEvaluated = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function inputOp(op) {
    if (operator && !justEvaluated) calculate(true);
    prev = current;
    operator = op;
    exprEl.textContent = prev + ' ' + op;
    justEvaluated = false;
    current = '0';
    updateDisplay();
  }

  function calculate(chaining = false) {
    if (!operator || !prev) return;
    const a = parseFloat(prev), b = parseFloat(current);
    let res;
    switch(operator) {
      case '+': res = a + b; break;
      case '−': res = a - b; break;
      case '×': res = a * b; break;
      case '÷': res = b !== 0 ? a / b : 'Error'; break;
    }
    if (!chaining) exprEl.textContent = prev + ' ' + operator + ' ' + current + ' =';
    current = String(typeof res === 'number' ? parseFloat(res.toFixed(10)) : res);
    operator = '';
    prev = '';
    justEvaluated = !chaining;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; prev = ''; operator = ''; justEvaluated = false;
    exprEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (current !== '0') current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('−');
    else if (e.key === '*') inputOp('×');
    else if (e.key === '/') { e.preventDefault(); inputOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
